services:
  api:
    build:
      context: ./provision
      dockerfile: Dockerfile
    container_name: swiftfly-api
    depends_on:
      - db
      - redis
      - mailcatch
    ports:
      - "9000:9000"
    volumes:
      - .:/var/www
    networks:
      - swiftfly
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: swiftfly-nginx
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./provision/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - swiftfly
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: swiftfly-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: swiftfly
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: swiftflydb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - swiftfly
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: swiftfly-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - swiftfly
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailcatch:
    image: dockage/mailcatcher:0.9.0
    container_name: swiftfly-mailcatch
    ports:
      - "1025:1025"
      - "1080:1080"
    networks:
      - swiftfly
    restart: unless-stopped

  docs:
    image: swaggerapi/swagger-ui:v5.31.2
    container_name: swiftfly-api-docs
    ports:
      - "3000:8080"
    volumes:
      - ./openapi.yml:/tmp/openapi.yml:ro
    environment:
      SWAGGER_JSON: /tmp/openapi.yml
    restart: unless-stopped

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  swiftfly:
    driver: bridge
